# Required metadata
# Replace 'your_project_key' with the key generated in SonarCloud/SonarQube
sonar.projectKey=ayhanarashtasin_Sust-Ai-Hackathon-OnsiteRound

# Replace 'your_organization' with your SonarCloud organization (if using SonarCloud)
sonar.organization=ayhanarashtasin

# Project display name
sonar.projectName= Sust-Ai-Hackathon-OnsiteRound

# Comma-separated paths to directories containing main source files.
sonar.sources=client/src,server

# Test classification and JavaScript coverage generated by `npm run test:coverage`.
sonar.tests=server/tests
sonar.test.inclusions=server/tests/**/*.test.js
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info

# Coverage gate applies to the decision engines exercised by the unit suite.
# Controllers, routes, scripts, and React views remain in security/quality analysis;
# only their coverage metric is deferred until integration/UI harnesses are added.
sonar.coverage.exclusions=client/src/**,server/config/**,server/controllers/**,server/middleware/**,server/models/**,server/routes/**,server/scripts/**,server/server.js,server/services/simEngine.js

# Locale dictionaries intentionally repeat the same keys in three languages.
sonar.cpd.exclusions=client/src/i18n/*.js

# Exclude build output and dependencies from analysis
sonar.exclusions=**/node_modules/**,client/dist/**,server/coverage/**

# Encoding of the source code
sonar.sourceEncoding=UTF-8
